name: build-and-push

on:
  push:
    branches:
      - 'master'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Get commit SHA short
        id: commit
        run: echo "sha7=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            steemfans/files-steem:latest
            steemfans/files-steem:latest-${{ steps.commit.outputs.sha7 }}
      -
        name: Image info
        run: |
          echo "=== Docker Image Information ==="
          echo "Image: steemfans/files-steem"
          echo "Tags:"
          echo "  - steemfans/files-steem:latest"
          echo "  - steemfans/files-steem:latest-${{ steps.commit.outputs.sha7 }}"
          echo "Digest: ${{ steps.docker_build.outputs.digest }}"
          echo "================================"
